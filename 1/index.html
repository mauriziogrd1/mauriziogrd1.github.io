<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
html, body {
width: 100%;
height: 100%;
overflow: hidden;
}
iframe {
width: 100%;
height: 100%;
border: none;
}
</style>
</head>
<body>
<iframe id="pdf-viewer" src=""></iframe>
<script>
const myPdf = 'https://mauriziogrd1.github.io/1/appunti_di_fisica.pdf'; 
const viewerUrl = 'https://mauriziogrd1.github.io/pdfjs/web/viewer.html';
document.getElementById('pdf-viewer').src = `${viewerUrl}?file=${encodeURIComponent(myPdf)}`;
</script>
</body>
</html>
